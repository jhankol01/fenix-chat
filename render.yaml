services:
  - type: web
    name: fenix-chat-api
    runtime: node
    region: ohio
    rootDir: server
    buildCommand: npm install
    startCommand: node src/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://fenixmeseenger.com
      - key: FRONTEND_URL
        value: https://fenixmeseenger.com
      - key: DATABASE_URL
        fromDatabase:
          name: fenix-chat-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: noreply@fenixmeseenger.com

databases:
  - name: fenix-chat-db
    plan: free
    region: ohio
