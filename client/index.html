<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Fenix Messenger — Mensajería simple con comunidades y salas de voz permanentes. Una experiencia de chat moderna y elegante." />
    <meta name="theme-color" content="#7C3AED" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fenix Messenger" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Fenix Messenger — Comunidades, Chat y Voz" />
    <meta property="og:description" content="Mensajería simple con comunidades y salas de voz permanentes. Más simple que Discord, más comunitaria que WhatsApp." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="Fenix Messenger" />
    <meta property="og:locale" content="es_ES" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fenix Messenger — Comunidades, Chat y Voz" />
    <meta name="twitter:description" content="Mensajería simple con comunidades y salas de voz permanentes. Tu comunidad. Tu espacio. Tus reglas." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Performance: preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/fenix-flame.png" />
    <title>Fenix Messenger — Comunidades, Chat y Voz 🔥</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {})
        })
      }
    </script>
  </body>
</html>
